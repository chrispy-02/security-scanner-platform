{% extends 'shared/layout.html' %}

{% block extracss %}
<link rel="stylesheet"    href="{{ url_for('static', filename='main/css/login.css') }}"/>
{% endblock %}

{% block title %}
<title>Log In</title>
{% endblock %}

{% block maincontent %}

<!-- Div to contain content -->
<div class="login_container">

    <!-- Div for login splash text -->
    <div class="login_splash">
        <p>Login</p>
    </div>

    <br><br>

    <hr>

    <!-- Form with two inputs and a button to capture login info -->
    <form onsubmit="checkCredentials(event)">
        <input type="text" id="email" placeholder="Your Email" required>
        <input type="password" id="password" placeholder="Your Password" required>
        <input type="hidden" id="next_page" value="{{ next_page }}">
        <button type="submit">Submit</button>
    </form>


    <div class="oauth_container">
        <button id="google-sign-in-btn" type="button">
            Sign in with Google
          </button>
    </div>

</div>


{% endblock %}

{% block extrajs %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" integrity="sha512-894YE6QWD5I59HgZOGReFYm4dnWc1Qt5NtvYSaNcOP+u1T9qYdvdihz0PPSiiqn/+/3e7Jo4EaG7TubfWGUrMQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
    window.GOOGLE_LOGIN_URL = "{{ url_for('login_google') }}";
</script>
<script src="{{ url_for('static', filename='main/js/auth.js') }}" defer></script>
{% endblock %}
